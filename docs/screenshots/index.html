<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Evolution Timeline</title>
<style>
  :root { color-scheme: light dark; font: 14px/1.4 -apple-system, system-ui, sans-serif; }
  body { margin: 0; display: grid; grid-template-columns: 200px 1fr; min-height: 100vh; }
  nav { border-right: 1px solid #0002; padding: 12px; overflow: auto; }
  nav h1 { font-size: 13px; margin: 0 0 8px; opacity: .6; text-transform: uppercase; letter-spacing: .08em; }
  nav button { display: block; width: 100%; text-align: left; padding: 6px 8px; margin-bottom: 2px; border: 0; background: transparent; border-radius: 4px; cursor: pointer; font: inherit; }
  nav button[aria-current="true"] { background: #0d7cff; color: white; }
  main { display: flex; flex-direction: column; min-width: 0; }
  header { padding: 12px 20px; border-bottom: 1px solid #0002; display: flex; gap: 16px; align-items: center; }
  header h2 { margin: 0; font-size: 16px; }
  header .meta { opacity: .6; font-size: 12px; }
  #stage { flex: 1; display: grid; place-items: center; overflow: auto; background: #0001; padding: 20px; min-height: 0; }
  #stage img { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 4px 24px #0003; background: white; }
  .controls { padding: 12px 20px; border-top: 1px solid #0002; display: flex; gap: 12px; align-items: center; }
  .controls input[type=range] { flex: 1; }
  .controls button { padding: 4px 10px; border-radius: 4px; border: 1px solid #0003; background: transparent; cursor: pointer; }
  .files { font-family: ui-monospace, monospace; font-size: 11px; opacity: .55; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60ch; }
  .empty { padding: 40px; opacity: .5; text-align: center; }
</style>
</head>
<body>
  <nav>
    <h1>Routes</h1>
    <div id="routes"></div>
  </nav>
  <main>
    <header>
      <h2 id="title">—</h2>
      <span class="meta" id="meta"></span>
      <span class="files" id="files"></span>
    </header>
    <div id="stage"><div class="empty">timeline.jsonl 없음. 코드 수정 후 턴 종료 시 자동 생성됩니다.</div></div>
    <div class="controls">
      <button id="play">▶</button>
      <input type="range" id="scrub" min="0" max="0" value="0">
      <span id="counter">0 / 0</span>
    </div>
  </main>

<script type="module">
const res = await fetch('./timeline.jsonl').catch(() => null)
if (!res || !res.ok) { throw new Error('no timeline') }
const text = await res.text()
const entries = text.trim().split('\n').filter(Boolean).map(l => JSON.parse(l))
const bySlug = new Map()
for (const e of entries) {
  if (!bySlug.has(e.slug)) bySlug.set(e.slug, [])
  bySlug.get(e.slug).push(e)
}
for (const arr of bySlug.values()) arr.sort((a, b) => a.ts.localeCompare(b.ts))

const nav = document.getElementById('routes')
const stage = document.getElementById('stage')
const title = document.getElementById('title')
const meta = document.getElementById('meta')
const filesEl = document.getElementById('files')
const scrub = document.getElementById('scrub')
const counter = document.getElementById('counter')
const playBtn = document.getElementById('play')

let current = null
let frame = 0
let timer = null

function render() {
  if (!current) return
  const arr = bySlug.get(current)
  const e = arr[frame]
  stage.innerHTML = `<img src="${e.file.replace('docs/evolution/', './')}" alt="">`
  title.textContent = current + '  —  ' + e.url
  meta.textContent = e.ts + (e.sha ? '  · ' + e.sha : '')
  filesEl.textContent = (e.files || []).join(' · ')
  scrub.max = arr.length - 1
  scrub.value = frame
  counter.textContent = `${frame + 1} / ${arr.length}`
}

function select(slug) {
  current = slug
  frame = bySlug.get(slug).length - 1
  for (const b of nav.querySelectorAll('button')) b.setAttribute('aria-current', b.dataset.slug === slug ? 'true' : 'false')
  render()
}

for (const slug of [...bySlug.keys()].sort()) {
  const btn = document.createElement('button')
  btn.textContent = `${slug} (${bySlug.get(slug).length})`
  btn.dataset.slug = slug
  btn.onclick = () => select(slug)
  nav.appendChild(btn)
}

scrub.oninput = () => { frame = +scrub.value; render() }
playBtn.onclick = () => {
  if (timer) { clearInterval(timer); timer = null; playBtn.textContent = '▶'; return }
  playBtn.textContent = '⏸'
  timer = setInterval(() => {
    const arr = bySlug.get(current)
    if (!arr) return
    frame = (frame + 1) % arr.length
    render()
  }, 600)
}

if (bySlug.size) select([...bySlug.keys()].sort()[0])
</script>
</body>
</html>
